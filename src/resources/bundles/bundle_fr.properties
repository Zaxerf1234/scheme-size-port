# Welcome & info
welcome.name = Bienvenue !
welcome.text = Bonjour, c'est moi, [#0096FF]xzxADIxzx#7729[], le seul développeur de ce mod.\nBeaucoup de gens ne connaissent pas la plupart des fonctionnalités de ce mod, j'ai donc activé les boutons mobiles par défaut et ajouté ce message de bienvenue. Allez aussi dans les paramètres de contrôle et de modification où vous pouvez désactiver ce message.\n\nSi vous aimez ce mod, laissez une étoile sur GitHub.\nBonne chance et que les dieux du java soient avec vous !
rename.name = Fichiers renommés !
rename.text = Le mod a trouvé des schémas de plus de 128 blocs de largeur ou de hauteur qui ne peuvent pas être chargés via le chargeur intégré. [accent]Leur extension a été changée en mtls[] pour éviter les erreurs futures, et ils seront chargés via le chargeur du mod.
incompatible.name = Mods incompatibles !
incompatible.text = Scheme Size est [red]absolument incompatible[] avec Miner Tools. Grâce à un bidouillage, ils ont réussi à fonctionner ensemble, mais utilisez-les à vos risques et périls.

