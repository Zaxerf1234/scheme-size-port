# Welcome & info
welcome.name = Chào mừng!
welcome.text = Xin chào, đây là tôi, [#0096FF]xzxADIxzx#7729[], nhà phát triển duy nhất của mod này.\nRất nhiều người không biết về hầu hết các tính năng của mod này, vì vậy tôi đã bật các nút di động theo mặc định và thêm thông báo chào mừng này. Hãy vào phần cài đặt điều khiển và chỉnh sửa để tắt thông báo này nếu muốn.\n\nNếu bạn thích mod này, hãy để lại một ngôi sao trên GitHub.\nChúc may mắn và cầu mong các vị thần java phù hộ bạn!
rename.name = Các tệp đã được đổi tên!
rename.text = Mod đã tìm thấy các bản thiết kế có kích thước lớn hơn 128 khối theo chiều rộng hoặc chiều cao và không thể tải qua trình tải trong game. [accent]Phần mở rộng của chúng đã được đổi thành mtls[] để tránh lỗi trong tương lai, và chúng sẽ được tải qua trình tải mod.
incompatible.name = Mod không tương thích!
incompatible.text = Scheme Size [red]hoàn toàn không tương thích[] với Miner Tools. Nhờ một giải pháp tạm, chúng có thể chạy cùng nhau, nhưng hãy sử dụng với rủi ro của riêng bạn.

